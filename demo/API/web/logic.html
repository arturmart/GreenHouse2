<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GreenHouse Logic</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
      background: #0b1020;
      color: #e7e9ee;
    }
    .wrap {
      max-width: 1300px;
      margin: 0 auto;
      padding: 20px;
    }
    .top {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #777;
      box-shadow: 0 0 14px rgba(255,255,255,.2);
    }
    .h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .sub {
      font-size: 12px;
      opacity: .75;
    }
    .card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,.35);
      margin-top: 14px;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button, input, select {
      background: rgba(255,255,255,.08);
      color: #e7e9ee;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    button { cursor: pointer; }
    button:hover { background: rgba(255,255,255,.12); }
    .pill {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
    }
    .muted { opacity: .75; }
    .good { color: #b9ffcc; }
    .bad { color: #ffb4b4; }
    .warn { color: #ffe3a1; }
    .mono { font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    .small { font-size: 12px; }

    .logic-node {
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      background: rgba(0,0,0,.18);
      padding: 12px;
    }

    .logic-node.active {
      border-color: rgba(73,242,138,.45);
      box-shadow: 0 0 0 1px rgba(73,242,138,.18) inset;
    }

    .logic-node.inactive {
      border-color: rgba(255,107,107,.25);
    }

    .logic-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .logic-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      opacity: .9;
      margin-bottom: 6px;
    }

    .logic-section {
      margin-top: 6px;
    }

    .logic-children {
      margin-left: 18px;
      margin-top: 10px;
      padding-left: 12px;
      border-left: 2px solid rgba(255,255,255,.08);
    }

    .prebox {
      background: #0f152d;
      border-radius: 12px;
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    a { color: #9bd3ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div id="dot" class="dot"></div>
        <div>
          <div class="h1">GreenHouse Logic</div>
          <div class="sub">Logic tree / runtime / debug</div>
        </div>
      </div>

      <div class="row">
        <span class="pill">API: <span id="apiBase" class="mono muted"></span></span>
        <select id="refresh">
          <option value="1000">обновлять: 1s</option>
          <option value="2000" selected>2s</option>
          <option value="5000">5s</option>
          <option value="10000">10s</option>
          <option value="0">вручную</option>
        </select>
        <button id="btnReload">Обновить</button>
        <a class="pill" href="/" target="_blank">Dashboard</a>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div>
          <div class="logic-title">Logic Tree View</div>
          <div class="sub">Правила, runtime, resolved args, actions</div>
        </div>
        <span id="logicCount" class="pill muted">0</span>
      </div>
      <div id="logicTree"></div>
    </div>

    <div class="card">
      <div class="logic-title">Raw JSON</div>
      <div class="sub">/api/json/logic/full</div>
      <div id="rawJson" class="prebox mono small"></div>
    </div>
  </div>

  <script src="/logic.js"></script>
</body>
</html>
